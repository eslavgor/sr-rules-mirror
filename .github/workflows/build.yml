name: Build SR rules

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/convert.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Run converter
        run: bash scripts/convert.sh

      - name: Push output to release branch
        run: |
          cd output
          git init -q
          git checkout -q --orphan release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "rebuild $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
